<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人作品集 | 新媒体运营</title>
    <style>
        /* 基础样式 - 极简主义 */
        :root {
            --bg: #fdfdfd;
            --text: #1a1a1a;
            --accent: #ff2442; /* 小红书风格红 */
            --gray: #666;
            --card-bg: #ffffff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'PingFang SC', 'Helvetica Neue', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; padding: 0 20px; }
        .container { max-width: 900px; margin: 0 auto; padding: 60px 0; }
        
        /* 模块布局 */
        section { margin-bottom: 80px; }
        h2 { font-size: 1.8rem; margin-bottom: 30px; letter-spacing: -0.5px; }

        /* 首页 */
        .hero { text-align: center; padding: 100px 0; }
        .hero h1 { font-size: 3.5rem; margin-bottom: 10px; }
        .hero p { font-size: 1.2rem; color: var(--gray); }

        /* 卡片网格 */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }
        .card { 
            background: var(--card-bg); padding: 30px; border-radius: 20px; 
            border: 1px solid #eee; transition: all 0.3s ease;
        }
        .card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
        .card h3 { margin-bottom: 15px; }
        .card p { color: var(--gray); font-size: 0.95rem; }

        /* 技能标签 */
        .skills { display: flex; flex-wrap: wrap; gap: 12px; }
        .tag { background: #f0f0f0; padding: 8px 16px; border-radius: 8px; font-size: 0.9rem; }

        /* 响应式 */
        @media (max-width: 600px) {
            .hero h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <section class="hero">
        <h1>[你的名字]</h1>
        <p>新媒体运营 | 内容增长专家 | 擅长IP化表达与用户留存</p>
    </section>

    <section id="projects">
        <h2>项目案例</h2>
        <div class="grid">
            <div class="card">
                <h3>教育账号矩阵搭建</h3>
                <p>从0到1负责账号矩阵，通过精细化内容分层，实现总粉量突破10w，转化率提升15%。</p>
            </div>
            <div class="card">
                <h3>小红书爆款增长</h3>
                <p>复盘用户痛点，产出高互动图文，单篇笔记曝光超200w，有效沉淀私域流量。</p>
            </div>
            <div class="card">
                <h3>个人IP孵化</h3>
                <p>通过人设定位与脚本优化，打造垂直领域专业人设，三个月内涨粉至5w+。</p>
            </div>
        </div>
    </section>

    <section id="skills">
        <h2>核心技能</h2>
        <div class="skills">
            <span class="tag">内容策划</span>
            <span class="tag">数据分析</span>
            <span class="tag">用户增长</span>
            <span class="tag">脚本撰写</span>
            <span class="tag">社群运营</span>
            <span class="tag">视觉审美</span>
        </div>
    </section>

    <section id="about">
        <h2>关于我</h2>
        <p>不仅是一个运营，更是一个内容创作的长期主义者。相信逻辑与感性的结合能够创造出跨越屏幕的价值。期待与有趣的团队并肩作战。</p>
    </section>
</div>

</body>
</html>
